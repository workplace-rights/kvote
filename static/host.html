<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>最佳貢獻獎 · 老師主持</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d1a;--card:#1a1a2e;--accent:#7c3aed;--green:#16a34a;--yellow:#d97706;--text:#f0f0ff;--muted:#8888aa}
body{font-family:'Microsoft JhengHei',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#setup-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.setup-card{background:var(--card);border-radius:20px;padding:40px;max-width:420px;width:90%;text-align:center;border:1px solid #2a2a4a}
.setup-card h1{font-size:26px;margin-bottom:8px}
.setup-card .sub{color:var(--muted);font-size:15px;margin-bottom:32px}
.setup-card label{font-size:14px;color:var(--muted);display:block;margin-bottom:6px;text-align:left}
.setup-card input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #3a3a5a;background:#12122a;color:var(--text);font-size:16px;font-family:inherit;margin-bottom:16px}
.setup-card input:focus{outline:none;border-color:var(--accent)}
.btn-start{width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-start:hover{background:#6d28d9}

#waiting-screen{display:none;min-height:100vh;padding:24px}
.w-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;max-width:1100px;margin:0 auto}
.w-side{display:flex;flex-direction:column;gap:16px}
.phase-title{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.big-title{font-size:32px;font-weight:700;margin-bottom:24px}
.qr-card{background:var(--card);border-radius:16px;padding:20px;text-align:center;border:1px solid #2a2a4a}
.qr-card h3{font-size:14px;color:var(--muted);margin-bottom:4px}
.qr-url{font-size:11px;color:#6666aa;margin-top:8px;word-break:break-all}
#qr-box{background:#fff;border-radius:12px;padding:10px;display:inline-block;margin:10px 0}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:8px}
.g-tile{border-radius:12px;padding:14px;text-align:center;font-size:15px;font-weight:500;border:2px solid transparent;transition:all 0.3s}
.g-tile.joined{background:#16423a;border-color:#16a34a;color:#4ade80;animation:pop-in 0.3s ease}
.g-tile.waiting{background:#1a1a2e;border-color:#2a2a4a;color:#555577}
@keyframes pop-in{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.stat-bar{background:var(--card);border-radius:12px;padding:16px;border:1px solid #2a2a4a}
.stat-bar .label{font-size:13px;color:var(--muted);margin-bottom:4px}
.stat-bar .val{font-size:28px;font-weight:700}
.stat-bar .val span{font-size:16px;color:var(--muted)}
.action-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-green{background:#16a34a;color:#fff}
.btn-green:hover{background:#15803d}
.btn-green:disabled{background:#2a3a2a;color:#666;cursor:not-allowed}
.btn-yellow{background:#d97706;color:#fff}
.btn-yellow:hover{background:#b45309}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid #3a3a5a}
.btn-ghost:hover{border-color:#6666aa;color:var(--text)}

#voting-screen{display:none;min-height:100vh;padding:24px}
.v-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;max-width:1100px;margin:0 auto}
.live-bars{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{width:80px;font-size:14px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:36px;background:#1a1a2e;border-radius:8px;overflow:hidden;border:1px solid #2a2a4a}
.bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:12px;font-weight:600;font-size:15px;transition:width 0.5s ease}
.not-voted-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.nv-chip{padding:6px 14px;border-radius:8px;font-size:13px;background:#2a1a1a;border:1px solid #5a2a2a;color:#ff8888}

#revealed-screen{display:none;min-height:100vh;padding:24px;text-align:center}
.winner-wrap{max-width:600px;margin:0 auto;padding-top:60px}
.trophy{font-size:80px;margin-bottom:16px;animation:trophy-bounce 0.6s ease}
@keyframes trophy-bounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.winner-name{font-size:52px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.winner-votes{font-size:20px;color:var(--muted);margin-bottom:40px}
.final-bars{max-width:500px;margin:0 auto 40px;display:flex;flex-direction:column;gap:10px}
.final-bar-row{display:flex;align-items:center;gap:10px}
.final-bar-label{width:80px;text-align:right;font-size:14px;flex-shrink:0}
.final-bar-track{flex:1;height:28px;background:#1a1a2e;border-radius:6px;overflow:hidden}
.final-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;font-size:13px;font-weight:600}
.bar-gold{background:linear-gradient(90deg,#d97706,#fbbf24)}
.bar-silver{background:#4a5568}
.bar-normal{background:#3a3a5a}
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confetti-fall linear forwards;pointer-events:none;z-index:999}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <div style="font-size:48px;margin-bottom:12px">🏆</div>
    <h1>最佳貢獻獎</h1>
    <p class="sub">老師主持畫面</p>
    <label>本次共幾組？</label>
    <input type="number" id="group-count" min="2" max="20" value="5" placeholder="輸入組數">
    <button class="btn-start" onclick="setupRoom()">建立活動 →</button>
  </div>
</div>

<div id="waiting-screen">
  <div class="w-layout">
    <div class="w-main">
      <div class="phase-title">📡 等待加入</div>
      <div class="big-title">請掃 QR Code 加入</div>
      <div class="groups-grid" id="groups-grid"></div>
    </div>
    <div class="w-side">
      <div class="qr-card">
        <h3>學生掃這裡</h3>
        <div id="qr-box"></div>
        <div class="qr-url" id="qr-url-text"></div>
      </div>
      <div class="stat-bar">
        <div class="label">已加入</div>
        <div class="val"><span id="joined-count">0</span> <span>/ <span id="total-count">?</span> 組</span></div>
      </div>
      <button class="action-btn btn-green" id="start-btn" onclick="startVote()" disabled>🗳 開始投票</button>
      <button class="action-btn btn-ghost" onclick="resetRoom()">↺ 重設 / 換組數</button>
    </div>
  </div>
</div>

<div id="voting-screen">
  <div class="v-layout">
    <div>
      <div class="phase-title">🗳 投票進行中</div>
      <div class="big-title" style="margin-bottom:20px">即時票數</div>
      <div class="live-bars" id="live-bars"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div style="background:var(--card);border-radius:12px;padding:16px;border:1px solid #2a2a4a">
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px">⏳ 尚未投票</div>
        <div class="not-voted-list" id="not-voted-list"></div>
      </div>
      <div class="stat-bar">
        <div class="label">投票進度</div>
        <div class="val"><span id="voted-count">0</span> <span>/ <span id="voting-total">?</span></span></div>
      </div>
      <button class="action-btn btn-yellow" onclick="reveal()">📊 公布結果</button>
      <button class="action-btn btn-ghost" onclick="resetRoom()">↺ 重設 / 換組數</button>
    </div>
  </div>
</div>

<div id="revealed-screen">
  <div class="winner-wrap">
    <div class="trophy">🏆</div>
    <div class="winner-name" id="winner-name">—</div>
    <div class="winner-votes" id="winner-votes"></div>
    <div class="final-bars" id="final-bars"></div>
    <button class="action-btn btn-ghost" style="max-width:300px;margin:0 auto" onclick="resetRoom()">↺ 再來一輪</button>
  </div>
</div>

<script>
let state = null;
let es = null;
let qrGenerated = false;
const VOTE_URL = location.origin + '/vote';

function showScreen(name) {
  ['setup','waiting','voting','revealed'].forEach(s => {
    document.getElementById(s+'-screen').style.display = 'none';
  });
  document.getElementById(name+'-screen').style.display =
    name === 'setup' ? 'flex' : 'block';
}

function setupRoom(){
  const n = parseInt(document.getElementById('group-count').value);
  if(n < 2 || n > 20){ alert('請輸入 2-20 之間的組數'); return; }
  fetch('/api/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({total_groups:n})})
    .then(r=>r.json()).then(d=>{
      if(d.ok){ qrGenerated = false; connectSSE(); }
    });
}

function connectSSE(){
  if(es){ es.close(); es = null; }
  es = new EventSource('/api/events');
  es.addEventListener('state', e => {
    state = JSON.parse(e.data);
    render();
  });
  es.onerror = () => { setTimeout(connectSSE, 3000); es.close(); es = null; };
}

function render(){
  if(!state) return;
  const s = state.status;
  if(s === 'waiting') { showScreen('waiting'); renderWaiting(); }
  else if(s === 'voting') { showScreen('voting'); renderVoting(); }
  else if(s === 'revealed') { showScreen('revealed'); renderRevealed(); }
}

function renderWaiting(){
  if(!qrGenerated){
    document.getElementById('qr-box').innerHTML = '';
    new QRCode(document.getElementById('qr-box'),{
      text: VOTE_URL, width:180, height:180,
      colorDark:'#1a1a18', colorLight:'#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    document.getElementById('qr-url-text').textContent = VOTE_URL;
    qrGenerated = true;
  }
  const {total_groups, participants} = state;
  const groups = Array.from({length:total_groups},(_,i)=>`第${i+1}組`);
  document.getElementById('groups-grid').innerHTML = groups.map(g => {
    const joined = participants.includes(g);
    return `<div class="g-tile ${joined?'joined':'waiting'}">${joined?'✅ ':'⬜ '}${g}</div>`;
  }).join('');
  document.getElementById('joined-count').textContent = participants.length;
  document.getElementById('total-count').textContent = total_groups;
  document.getElementById('start-btn').disabled = participants.length < 2;
}

const BAR_COLORS = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#db2777','#0891b2','#65a30d'];

function renderVoting(){
  const {participants, tally, not_voted} = state;
  const maxVotes = Math.max(...Object.values(tally), 1);
  document.getElementById('live-bars').innerHTML = participants.map((g,i) => {
    const v = tally[g]||0;
    const pct = Math.round(v/maxVotes*100);
    return `<div class="bar-row">
      <div class="bar-label">${g}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.max(pct,v>0?6:0)}%;background:${BAR_COLORS[i%BAR_COLORS.length]}">${v>0?v:''}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('not-voted-list').innerHTML = not_voted.length
    ? not_voted.map(g=>`<div class="nv-chip">${g}</div>`).join('')
    : '<span style="color:#4ade80;font-size:13px">✅ 全員已投票！</span>';
  document.getElementById('voted-count').textContent = state.voted.length;
  document.getElementById('voting-total').textContent = participants.length;
}

function renderRevealed(){
  const {participants, tally} = state;
  const sorted = [...participants].sort((a,b)=>(tally[b]||0)-(tally[a]||0));
  const winner = sorted[0];
  document.getElementById('winner-name').textContent = winner;
  document.getElementById('winner-votes').textContent = `獲得 ${tally[winner]||0} 票 🎉`;
  document.getElementById('final-bars').innerHTML = sorted.map((g,i) => {
    const v = tally[g]||0;
    const pct = (tally[winner]||1) ? Math.round(v/(tally[winner]||1)*100) : 0;
    const cls = i===0?'bar-gold':i===1?'bar-silver':'bar-normal';
    return `<div class="final-bar-row">
      <div class="final-bar-label">${['🥇','🥈','🥉'][i]||'　'}${g}</div>
      <div class="final-bar-track">
        <div class="final-bar-fill ${cls}" style="width:${Math.max(pct,4)}%">${v} 票</div>
      </div>
    </div>`;
  }).join('');
  launchConfetti();
}

function launchConfetti(){
  const colors=['#fbbf24','#f87171','#34d399','#60a5fa','#c084fc','#fb923c'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

function startVote(){ fetch('/api/start',{method:'POST'}); }
function reveal(){ fetch('/api/reveal',{method:'POST'}); }

function resetRoom(){
  if(!confirm('確定重設？所有資料將清除')) return;
  if(es){ es.close(); es = null; }
  fetch('/api/reset',{method:'POST'}).then(()=>{
    state = null;
    qrGenerated = false;
    showScreen('setup');
  });
}

// 頁面載入時檢查是否已有活動
fetch('/api/state').then(r=>r.json()).then(d=>{
  if(d.total_groups > 0){
    state = d;
    connectSSE();
  }
});
</script>
</body>
</html>
